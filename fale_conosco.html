<!DOCTYPE html>
<html lang="pt-br"><!--pagina fale conosco-->
    <head>
        <meta charset="UTF-8" />
        <title>World Rock</title>
            <link rel="stylesheet" href="styles.css">
    </head>
    <body class="house2">
         <!--banner inicial-->
         <img class="for" src="imagens/form2.png" alt="formulario">
         <!--botao home para voltar a pagina principal-->
         <a href="index.html"><img class= "hou1" src="imagens/house.png" alt="house"></a>
        
        <div>
            <form class="form" border="5"><!--corpo do formulario-->
                <fieldset>
                    <legend>Fale conosco</legend><br><!--titulo do formulario-->
                   
                    <!--dados para preeenchimento do formulario-->
                   
                    Nome <input type="text" id="nome" name="nome" maxlength="20" required placeholder="Digite seu nome" autofocus  ><br>
                    Data de nasc <input type="date" id="data_de_nasc" name="data de nas" required  autofocus  ><br>
                    País <input type="text" id="Pais" name="País" maxlength="20" required placeholder="Digite seu País" autofocus  ><br>
                    Tel <input type="tel" id="telefone" name="telefone" maxlength="20" required placeholder="Digite see telefone" autofocus  ><br>
                    Email <input type="email" id="email" name="email" maxlength="50" required placeholder="Digite seu email" autofocus  ><br>
                    Masc <input type="radio"  name="genero" value="masculino" required><br>
                    Fem <input type="radio" id="Fem" name="genero" value="feminino" required ><br>
                    deseja receber atualizações do site <input type="checkbox" id="atualizaçao" name="atulização" ><br>
                  <textarea id="comentarios" name="comentarios" rows="6" placeholder="Deixe seu Feedback" ></textarea><br>
                   <button type="submit">Enviar</button>
                     <button type="reset">Reset</button>
                </fieldset>
                
            </form>
        </div>
        
        
   
      
        
   
   
    </body>
</html>
